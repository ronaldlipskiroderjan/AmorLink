# =============================================
# CONFIGURAÇÕES DO APLICATIVO ROMÂNTICO 💕
# =============================================

# Porta do servidor (padrão: 8080)
server.port=8080

# =============================================
# BANCO DE DADOS POSTGRESQL
# =============================================
# 💡 Crie o banco antes de rodar: CREATE DATABASE amordb;
spring.datasource.url=jdbc:postgresql://localhost:5432/amordb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA - Atualiza tabelas automaticamente (usar "validate" ou Flyway em produção)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# =============================================
# SEGURANÇA JWT
# =============================================
# 💡 Troque o secret por uma string Base64 aleatória e longa em produção!
app.jwt.secret=bXlTZWNyZXRLZXlGb3JBbW9yQXBwSldUQXV0aGVudGljYXRpb25Ub2tlbjIwMjU=
# Expiração do token em milissegundos (padrão: 24h = 86400000ms)
app.jwt.expiration-ms=86400000

# =============================================
# SUPER ADMIN — Conta do dono do SaaS
# =============================================
# 💡 TROQUE ANTES DE IR A PRODUÇÃO!
app.superadmin.username=superadmin
app.superadmin.password=admin@123
